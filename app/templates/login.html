{% extends "layout.html" %}{% block content %}<section class="auth-page">
    <div class="auth-card">
        <h1>로그인</h1>
        <p>회원 로그인 후 더 많은 혜택을 확인하세요.</p>{% if error %}<div class="error-box">{{ error }}</div>{% endif %}<form
            action="/login" method="POST"><input type="hidden" name="next"
                value="{{ next_url }}"><label>아이디</label><input type="text" name="username"
                placeholder="아이디"><label>비밀번호</label><input type="password" name="password" placeholder="비밀번호"><button
                class="btn primary full" type="submit">로그인</button></form>
        <div class="login-help">
            <p>데모 계정: jasmine / pass1234</p>
            <p>관리자: admin / admin1234</p>
        </div>
    </div>
</section>{% endblock %}
